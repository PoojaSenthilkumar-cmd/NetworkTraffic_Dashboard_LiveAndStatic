[server]
# Allow up to 2GB file uploads
maxUploadSize = 2048
# Increase request size limits for large files
maxMessageSize = 200
# Increase client connection timeout
clientConnectionTimeout = 41

[client]
# Disable XSRF protection to allow large uploads
showErrorDetails = true

[logger]
level = "info"

[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
